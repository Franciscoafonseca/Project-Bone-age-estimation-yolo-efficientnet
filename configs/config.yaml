# ============================================================
# Bone Age Identification - YOLO Crop + EfficientNetV2 Regression
# Safe config for Windows / Cheetah VM without NVIDIA GPU
# ============================================================

# ============================================================
# Training
# ============================================================

learning_rate: 0.0001
epochs: 2
batch_size: 2

train_split: 0.7
val_split: 0.15
test_split: 0.15

seed: 42
save_interval: 1
num_workers: 0

optimizer: "adam"
momentum: 0.9
weight_decay: 0.0001

use_lr_scheduler: False
lr_gamma: 0.5
lr_step_size: 15

early_stop_patience: 10
early_stop_min_delta: 0.00001

# ============================================================
# Task
# ============================================================

model_task: "regression"
model_name: "efficientnet_v2_m"

pretrained: True

stage_method: "H"
stage_jaw_selection: "both"

use_with_treatment: False
dataset_layout: "flat"
treatment_col: null

age_threshold: 16
use_class_weights: False
use_regression_sigmoid: False

# ============================================================
# CPU / GPU
# ============================================================

# Keep "all".
# If CUDA exists, it uses available GPU.
# If not, it falls back to CPU.
gpu_ids: "all"

# ============================================================
# Excel / labels
# ============================================================

ann_file: "FCT2025_Final.xlsx"
excel_sheet: 0

# Your Excel has no image ID column.
# Therefore:
# 1.jpg -> Excel row 1
# 2.jpg -> Excel row 2
# ...
id_col: null

target_col: "Idade na data da radiografia (meses)"
target_unit: "months"

normalize_age: True
min_age: 5
max_age: 26

sex_col: "Sexo"
birth_date_col: "Data de Nascimento"
opg_date_col: "Data de realização da radiografia"
age_col: "Idade na data da radiografia (anos)"

# ============================================================
# Image preprocessing
# ============================================================

image_processing: "yolo_crop"

input_image_dir: "data/images"
output_preprocessed_dir: "data/preprocessed"

# First proper run: True, to regenerate YOLO crops.
# After crops are generated and checked, change to False.
recreate_dataset: True

# ============================================================
# YOLO crop
# ============================================================

yolo_model_path: "models/yolo_hand/best.pt"

# Since the VM probably has no NVIDIA, force YOLO to CPU.
yolo_device: "cpu"

yolo_conf: 0.30
yolo_iou: 0.45
yolo_imgsz: 640

yolo_padding_x: 0.04
yolo_padding_y: 0.04

yolo_fixed_ratio: True
yolo_crop_ratio: 0.75
yolo_crop_scale: 1.12
yolo_output_size: 384

yolo_center_shift_x: 0.0
yolo_center_shift_y: 0.05

yolo_pad_value: 0
yolo_save_previews: True

# If YOLO misses a hand, do not skip the image.
# Use the classical crop instead.
yolo_fallback: "classical_crop"

# ============================================================
# W&B
# ============================================================

project_name: "age-regression-cheetah-cpu"
run_name: "cpu_test_2_epochs_yolo_efficientnetv2m"

# ============================================================
# Grad-CAM
# ============================================================

# Keep False for the first test.
# Heatmaps are slow on CPU.
generate_heatmaps: False
heatmap_max_images: 8
